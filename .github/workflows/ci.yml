name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Real Supabase project — no mocks, per docs/08-roadmap.md's Phase 13
# instruction. The E2E tests (tests/e2e/helpers/test-users.ts) and the app
# itself both read a physical .env.local file, so it's materialized here
# from repo secrets rather than changed to read process.env directly, to
# keep the exact same code path locally and in CI.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
# These must point at a real Supabase project reachable from GitHub's
# runners. This workflow has not yet executed a real run against those
# secrets — see this phase's report for the current verification status.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Write .env.local from secrets
        run: |
          cat <<EOF > .env.local
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Unit + component tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e
